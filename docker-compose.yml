version: "3.9"

services:
  ace-image-organizer:
    build: .
    image: ace-image-organizer:latest
    container_name: ace-image-organizer
    restart: unless-stopped
    ports:
      - "8095:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      # Stack/Portainer env vars must be listed here or they never enter the container.
      ENABLE_SSO: ${ENABLE_SSO:-false}
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:-}
      SSO_LOGIN_URL: ${SSO_LOGIN_URL:-https://sso.aceelectronics.com}
      APP_URL: ${APP_URL:-https://image.aceelectronics.com}
      APP_DOMAIN: ${APP_DOMAIN:-aceelectronics.com}
      DATABASE_URL: ${DATABASE_URL:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      # Certificate auth for Portainer (base64 of PEM + key). Leave secret empty when using these.
      AZURE_CLIENT_CERT_PEM_BASE64: ${AZURE_CLIENT_CERT_PEM_BASE64:-}
      AZURE_CLIENT_CERT_KEY_BASE64: ${AZURE_CLIENT_CERT_KEY_BASE64:-}
      SHAREPOINT_SITE_HOSTNAME: ${SHAREPOINT_SITE_HOSTNAME:-aceelectronics.sharepoint.us}
      SHAREPOINT_SITE_PATH: ${SHAREPOINT_SITE_PATH:-/sites/jobtravelerphotos}
      SHAREPOINT_SITE_ID: ${SHAREPOINT_SITE_ID:-}
      SHAREPOINT_DRIVE_ID: ${SHAREPOINT_DRIVE_ID:-}
      ENABLE_EXCEL_SFTP_SYNC: ${ENABLE_EXCEL_SFTP_SYNC:-true}
      SFTP_HOST: ${SFTP_HOST:-192.2.150.2}
      SFTP_PORT: ${SFTP_PORT:-22}
      SFTP_USER: ${SFTP_USER:-ppadm}
      # Prefer SFTP_PASSWORD_B64 — Portainer collapses "$$" → "$" in plain passwords.
      # Real password 235$$hPW#@! → base64 MjM1JCRoUFcjQCE=
      SFTP_PASSWORD: ${SFTP_PASSWORD:-}
      SFTP_PASSWORD_B64: ${SFTP_PASSWORD_B64:-}
      SFTP_PASSWORD_DOLLAR_ESCAPE: ${SFTP_PASSWORD_DOLLAR_ESCAPE:-double}
      SFTP_REMOTE_DIRS: ${SFTP_REMOTE_DIRS:-/mnt/sage,/mnt/import}
    env_file:
      - path: .env
        required: false
    networks:
      ace-image-organizer-net:
        ipv4_address: 172.28.55.10
      ace-network:

networks:
  ace-image-organizer-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.55.0/24
  ace-network:
    external: true
