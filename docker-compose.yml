version: "3.9"

services:
  ace-image-organizer:
    build: .
    image: ace-image-organizer:latest
    container_name: ace-image-organizer
    restart: unless-stopped
    ports:
      - "8095:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      SSO_JWT_SECRET: ${SSO_JWT_SECRET}
      SSO_LOGIN_URL: ${SSO_LOGIN_URL:-https://sso.aceelectronics.com}
      APP_URL: ${APP_URL:-https://image.aceelectronics.com}
      APP_DOMAIN: ${APP_DOMAIN:-aceelectronics.com}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      SHAREPOINT_SITE_HOSTNAME: ${SHAREPOINT_SITE_HOSTNAME:-aceelectronics.sharepoint.us}
      SHAREPOINT_SITE_PATH: ${SHAREPOINT_SITE_PATH:-/sites/jobtravelerphotos}
      SHAREPOINT_DRIVE_ID: ${SHAREPOINT_DRIVE_ID:-}
    env_file:
      - path: .env
        required: false
    networks:
      ace-image-organizer-net:
        ipv4_address: 172.28.55.10
      ace-network:

networks:
  ace-image-organizer-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.55.0/24
  ace-network:
    external: true
